name: Deploy Lab Hive

# Every push to main: apply DB migrations, deploy the API Worker, build + deploy the frontend.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Root install (api + packages workspaces) and Prisma client
      - name: Install workspace deps
        run: npm install
      - name: Generate Prisma client
        run: npm run db:generate

      # Safety guard: AUTH_SECRET must be a wrangler secret, never a committed plaintext var.
      # A plaintext [vars] entry would override the secret and ship a known key to production.
      - name: Assert AUTH_SECRET is not a plaintext var
        run: |
          if grep -Eq '^[[:space:]]*AUTH_SECRET[[:space:]]*=' api/wrangler.toml; then
            echo "::error::AUTH_SECRET must be a wrangler secret, not a plaintext [vars] entry in api/wrangler.toml"; exit 1
          fi

      # Apply pending D1 migrations to production, then deploy the API Worker
      - name: Apply D1 migrations (production)
        run: cd api && npx wrangler d1 migrations apply labhive --remote
      - name: Deploy API Worker
        run: cd api && npx wrangler deploy

      # Build + deploy the Next.js frontend (OpenNext on Cloudflare Workers)
      - name: Install web deps
        run: cd web && npm install
      - name: Build & deploy frontend
        run: cd web && npx opennextjs-cloudflare build && npx opennextjs-cloudflare deploy
        env:
          NEXT_PUBLIC_API_URL: https://labhive-api.asifmecheri999.workers.dev
